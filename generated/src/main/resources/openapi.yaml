openapi: 3.0.0
info:
  title: Techwave Payments API
  version: 1.0.0
servers:
- url: /
tags:
- description: Payments API
  name: payments
paths:
  /payments:
    get:
      description: Get Payments
      parameters:
      - description: The minimum payment amount (inclusive)
        explode: true
        in: query
        name: minAmount
        required: false
        schema:
          type: number
        style: form
      - description: A list of three letter ISO 4217 codes to include
        explode: true
        in: query
        name: currencies
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Payments:
                  $ref: "#/components/examples/Payments"
                NoPaymentsFound:
                  $ref: "#/components/examples/NoPaymentsFound"
              schema:
                $ref: "#/components/schemas/Payments"
          description: Payments
      tags:
      - payments
      x-accepts:
      - application/json
      x-tags:
      - tag: payments
    post:
      description: Create Payment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Payment"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
          description: Payment Created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequest"
          description: Bad Request
      tags:
      - payments
      x-content-type: application/json
      x-accepts:
      - application/json
      x-tags:
      - tag: payments
components:
  examples:
    NoPaymentsFound:
      summary: No Payments Found
      value: []
    Payments:
      summary: Payments
      value:
      - currency: GBP
        amount: 100.0
        counterparty:
          type: SORT_CODE_ACCOUNT_NUMBER
          accountNumber: 123456
          sortCode: 12345678
      - currency: EUR
        amount: 250.1
        counterparty:
          type: SORT_CODE_ACCOUNT_NUMBER
          accountNumber: 123456
          sortCode: 12345678
  schemas:
    Account:
      example:
        type: SORT_CODE_ACCOUNT_NUMBER
        accountNumber: "12345678"
        sortCode: "123456"
      properties:
        type:
          enum:
          - SORT_CODE_ACCOUNT_NUMBER
          type: string
        accountNumber:
          example: "12345678"
          maxLength: 8
          minLength: 8
          type: string
        sortCode:
          example: "123456"
          maxLength: 6
          minLength: 6
          type: string
      required:
      - accountNumber
      - sortCode
      - type
      type: object
    Payment:
      example:
        amount: 10.0
        counterparty:
          type: SORT_CODE_ACCOUNT_NUMBER
          accountNumber: "12345678"
          sortCode: "123456"
        currency: GBP
      properties:
        currency:
          description: The three letter ISO 4217 code
          example: GBP
          maxLength: 3
          minLength: 3
          type: string
        amount:
          description: Amount must not be negative
          example: 10.0
          minimum: 0
          type: number
        counterparty:
          $ref: "#/components/schemas/Account"
      required:
      - amount
      - counterparty
      - currency
      type: object
    Payments:
      items:
        $ref: "#/components/schemas/Payment"
      readOnly: true
      type: array
    Error:
      example:
        message: message
      properties:
        message:
          type: string
      type: object
    BadRequest:
      example:
        errors:
        - message: message
        - message: message
      properties:
        errors:
          items:
            $ref: "#/components/schemas/Error"
          type: array
      type: object
